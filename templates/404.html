{% extends "base.html" %}

{% block title %}Page Not Found — Hustle & Crack{% endblock %}

{% block content %}
<div class="glass-card" style="text-align: center; max-width: 600px; margin: 3rem auto;">
    <div style="font-size: 5rem; color: var(--gold);">404</div>
    <h2 style="font-family: var(--font-display); margin: 1rem 0;">Page Not Found</h2>
    <p>Oops! The page you are looking for does not exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="btn-gold" style="display: inline-block; margin-top: 1.5rem;">
        <i class="fas fa-home"></i> Go to Home
    </a>
</div>
{% endblock %}
